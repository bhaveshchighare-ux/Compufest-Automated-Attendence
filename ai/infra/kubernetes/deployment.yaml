apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-interview-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-interview-api
  template:
    metadata:
      labels:
        app: ai-interview-api
    spec:
      containers:
        - name: api
          image: ai-interview-engine:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-interview-config
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
